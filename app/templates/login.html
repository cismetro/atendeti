{% extends "base.html" %}

{% block content %}
<div id="login-section" class="section">
    <h2>Login no Sistema</h2>
    
    <div class="auth-options">
        <div class="auth-option active" data-role="user">Usuário</div>
        <div class="auth-option" data-role="support">Suporte</div>
    </div>
    
    <form id="form-login-flask" class="login-form" method="POST" action="{{ url_for('auth.login') }}">
        <div class="form-group">
            <label for="login-email">Email:</label>
            <input type="email" name="email" id="login-email" required placeholder="Digite seu email">
        </div>
        
        <div class="form-group">
            <label for="login-senha">Senha:</label>
            <div style="position: relative;">
                <input type="password" name="senha" id="login-senha" required placeholder="Digite sua senha" style="padding-right: 40px;">
            </div>
        </div>
        
        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        
        <button type="submit" class="btn btn-primary" style="width: 100%;">Entrar</button>
        
        <div style="text-align: center; margin-top: 15px;">
            <p style="color: #666;">Não tem acesso? <a href="{{ url_for('auth.register') }}" style="color: #3498db; font-weight: bold;">Cadastre-se aqui</a></p>
        </div>
    </form>
</div>

<!-- Modal informativo original (opcional, mantido para referência do usuário) -->
<div class="container" style="margin-top: 20px;">
  <div class="panel panel-info">
    <div class="panel-heading">Dica de Acesso (Desenvolvimento)</div>
    <div class="panel-body">
      <p>Utilize o usuário padrão criado:</p>
      <p><strong>Email:</strong> ti@hospital.com</p>
      <p><strong>Senha:</strong> admin123</p>
    </div>
  </div>
</div>
{% endblock %}
